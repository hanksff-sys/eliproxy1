<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Roboto:wght@400&family=Open+Sans:wght@600&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
      /* remove default body margin so the slide fits exactly the min-height */
      html, body { margin: 0; padding: 0; }
      .slide-container {
        width: 1280px;
        min-height: 720px; /* required, keep it */
        background: #FFFFFF;
        font-family: 'Roboto', sans-serif;
        color: #64748B;
        display: flex;
        align-items: center;
        position: relative;
        overflow: hidden;
      }
      .grid-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: radial-gradient(#64748B 1px, transparent 1px);
        background-size: 40px 40px;
        opacity: 0.05;
      }
      .content-left {
        width: 60%;
        padding-top: 100px; /* do not change: title top padding must remain */
        padding-left: 80px;
        z-index: 2;
      }
      .content-right {
        width: 40%;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 2;
      }
      h1 {
        font-family: 'Montserrat', sans-serif;
        font-size: 64px;
        color: #1E293B;
        line-height: 1.1;
        margin-bottom: 30px;
      }
      /* reduced spacing under subtitle to save vertical space */
      h2 {
        font-family: 'Open Sans', sans-serif;
        font-size: 32px;
        color: #F97316;
        margin-bottom: 30px;
      }
      /* reduced author box top gap */
      .author-box {
        display: flex;
        align-items: center;
        gap: 15px;
        margin-top: 30px;
      }
      .author-icon {
        width: 40px;
        height: 40px;
        background: #1E293B;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
      }
      /* slightly reduced logo to avoid vertical overflow */
      .logo-img {
        width: 360px;
        height: 360px;
        object-fit: contain;
        filter: drop-shadow(0 20px 30px rgba(0,0,0,0.1));
      }
      .accent-bar {
        position: absolute;
        bottom: 0;
        left: 80px;
        width: 200px;
        height: 8px;
        background: #F97316;
      }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="grid-overlay"></div>
        <div class="content-left">
            <h1>Configuração de DNS para Eli Proxy</h1>
            <h2>O Guia Definitivo para o seu Domínio Profissional</h2>
            <div class="author-box">
                <div class="author-icon"><i class="fas fa-user"></i></div>
                <div>
                    <p style="font-weight: bold; color: #1E293B; margin:0">Eli Proxy</p>
                    <p style="font-size: 16px; margin:4px 0 0 0">Especialista em Conectividade</p>
                </div>
            </div>
        </div>
        <div class="content-right">
            <img src="/home/ubuntu/upload/pasted_file_lKkgoE_WhatsAppImage2026-03-01at10.20.56.jpeg" class="logo-img" alt="Eli Proxy Logo">
        </div>
        <div class="accent-bar"></div>
    </div>
</body>
</html>
